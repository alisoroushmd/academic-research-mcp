name: AcademicResearch
options:
  bundleIdPrefix: com.academicresearch
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  AcademicResearch:
    type: application
    platform: iOS
    sources:
      - AcademicResearch
    settings:
      base:
        INFOPLIST_FILE: AcademicResearch/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.academicresearch.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR: false
        SWIFT_EMIT_LOC_STRINGS: true
